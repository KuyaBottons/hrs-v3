<!DOCTYPE html>
<html>
<head>
    <title>Debug Employee Dropdown</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background: #d4edda; border-color: #c3e6cb; }
        .error { background: #f8d7da; border-color: #f5c6cb; }
        .info { background: #d1ecf1; border-color: #bee5eb; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 3px; overflow-x: auto; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Employee Dropdown Debug Tool</h1>
    
    <div class="section info">
        <h3>Current User Info</h3>
        <div id="userInfo"></div>
    </div>

    <div class="section">
        <h3>Test API Calls</h3>
        <button onclick="testEmployeesAPI()">Test Employees API</button>
        <button onclick="testDepartmentsAPI()">Test Departments API</button>
        <button onclick="testPermissions()">Test Permissions</button>
    </div>

    <div class="section">
        <h3>Results</h3>
        <div id="results"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost/hrs-v2/server/api';
        
        // Display current user info
        function displayUserInfo() {
            const userStr = sessionStorage.getItem('hris_user');
            const userDiv = document.getElementById('userInfo');
            
            if (!userStr) {
                userDiv.innerHTML = '<p class="error">No user logged in! Please login first.</p>';
                return null;
            }
            
            try {
                const user = JSON.parse(userStr);
                userDiv.innerHTML = `
                    <pre>${JSON.stringify(user, null, 2)}</pre>
                `;
                return user;
            } catch (e) {
                userDiv.innerHTML = `<p class="error">Error parsing user: ${e.message}</p>`;
                return null;
            }
        }

        // Test Employees API
        async function testEmployeesAPI() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<p>Testing Employees API...</p>';
            
            const user = displayUserInfo();
            if (!user) {
                resultsDiv.innerHTML += '<p class="error">Cannot test without logged in user</p>';
                return;
            }

            try {
                const headers = {
                    'Content-Type': 'application/json'
                };
                if (user.id) {
                    headers['X-User-ID'] = String(user.id);
                }

                console.log('Request headers:', headers);

                const response = await fetch(`${API_BASE}/employees.php`, { headers });
                
                resultsDiv.innerHTML += `<p>Response Status: ${response.status} ${response.statusText}</p>`;
                
                const data = await response.json();
                
                if (!response.ok) {
                    resultsDiv.innerHTML += `<div class="error"><h4>Error Response:</h4><pre>${JSON.stringify(data, null, 2)}</pre></div>`;
                    return;
                }

                resultsDiv.innerHTML += `<div class="success"><h4>Success! Found ${data.length} employees</h4></div>`;
                
                // Filter by user's department
                const userDept = user.department;
                const filteredEmps = data.filter(e => 
                    e.department && e.department.toLowerCase() === userDept?.toLowerCase()
                );
                
                resultsDiv.innerHTML += `<p>User Department: <strong>${userDept}</strong></p>`;
                resultsDiv.innerHTML += `<p>Employees in user's department: <strong>${filteredEmps.length}</strong></p>`;
                
                if (filteredEmps.length > 0) {
                    resultsDiv.innerHTML += `<h4>Sample Employees:</h4><pre>${JSON.stringify(filteredEmps.slice(0, 5), null, 2)}</pre>`;
                } else {
                    resultsDiv.innerHTML += `<div class="error"><p>No employees found in department: ${userDept}</p></div>`;
                    resultsDiv.innerHTML += `<h4>All Departments in Data:</h4>`;
                    const depts = [...new Set(data.map(e => e.department))];
                    resultsDiv.innerHTML += `<pre>${JSON.stringify(depts, null, 2)}</pre>`;
                }
                
            } catch (error) {
                resultsDiv.innerHTML += `<div class="error"><h4>Error:</h4><pre>${error.message}\n${error.stack}</pre></div>`;
            }
        }

        // Test Departments API
        async function testDepartmentsAPI() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<p>Testing Departments API...</p>';
            
            const user = displayUserInfo();
            if (!user) {
                resultsDiv.innerHTML += '<p class="error">Cannot test without logged in user</p>';
                return;
            }

            try {
                const headers = {
                    'Content-Type': 'application/json'
                };
                if (user.id) {
                    headers['X-User-ID'] = String(user.id);
                }

                const response = await fetch(`${API_BASE}/departments.php`, { headers });
                
                resultsDiv.innerHTML += `<p>Response Status: ${response.status} ${response.statusText}</p>`;
                
                const data = await response.json();
                
                if (!response.ok) {
                    resultsDiv.innerHTML += `<div class="error"><h4>Error Response:</h4><pre>${JSON.stringify(data, null, 2)}</pre></div>`;
                    return;
                }

                resultsDiv.innerHTML += `<div class="success"><h4>Success! Found ${data.length} departments</h4><pre>${JSON.stringify(data, null, 2)}</pre></div>`;
                
            } catch (error) {
                resultsDiv.innerHTML += `<div class="error"><h4>Error:</h4><pre>${error.message}\n${error.stack}</pre></div>`;
            }
        }

        // Test Permissions
        async function testPermissions() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<p>Testing Permissions...</p>';
            
            const user = displayUserInfo();
            if (!user) {
                resultsDiv.innerHTML += '<p class="error">Cannot test without logged in user</p>';
                return;
            }

            try {
                const headers = {
                    'Content-Type': 'application/json'
                };
                if (user.id) {
                    headers['X-User-ID'] = String(user.id);
                }

                const response = await fetch(`${API_BASE}/module_permissions.php?user_id=${user.id}`, { headers });
                
                resultsDiv.innerHTML += `<p>Response Status: ${response.status} ${response.statusText}</p>`;
                
                const data = await response.json();
                
                if (!response.ok) {
                    resultsDiv.innerHTML += `<div class="error"><h4>Error Response:</h4><pre>${JSON.stringify(data, null, 2)}</pre></div>`;
                    return;
                }

                resultsDiv.innerHTML += `<div class="success"><h4>User Permissions:</h4><pre>${JSON.stringify(data, null, 2)}</pre></div>`;
                
                // Check for Employee Masterlist permission
                const empPermission = data.permissions?.find(p => p.module_name === 'Employee Masterlist');
                if (empPermission) {
                    resultsDiv.innerHTML += `<div class="info"><h4>Employee Masterlist Permission:</h4><pre>${JSON.stringify(empPermission, null, 2)}</pre></div>`;
                } else {
                    resultsDiv.innerHTML += `<div class="error"><p>No permission found for Employee Masterlist!</p></div>`;
                }
                
            } catch (error) {
                resultsDiv.innerHTML += `<div class="error"><h4>Error:</h4><pre>${error.message}\n${error.stack}</pre></div>`;
            }
        }

        // Initialize
        displayUserInfo();
    </script>
</body>
</html>
